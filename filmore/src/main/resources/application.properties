spring.application.name=filmore
# Set root logging level to WARN (shows only WARN, ERROR, FATAL)
logging.level.root=WARN
# Optionally silence specific packages (e.g., Hibernate, Tomcat)
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
spring.main.banner-mode=off

# DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/filmore
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB

server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=-1

file.upload.video-dir=uploads/videos
file.upload.images-dir=uploads/images

spring.mail.host=smtp.gmail.com
spring.mail.port=587
