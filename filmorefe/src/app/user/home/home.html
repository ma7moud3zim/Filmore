<div class="dashboard-container">
  <app-header [showRouterOutlet]="false"> </app-header>

  <section class="banner-slider" *ngIf="!featuredLoading && featuredVideos.length > 0">
    <div class="slider-container">
      <div class="slides">
        <div
          class="slide"
          *ngFor="let video of featuredVideos; let i = index"
          [class.active]="i === currentSlideIndex"
        >
          <img class="banner-bg" [src]="getPosterUrl(video)" alt="Video.title" />
          <div class="banner-overlay"></div>
          <div class="banner-content">
            <h2 class="banner-title">{{ video.title }}</h2>
            <p class="banner-description">{{ video.description }}</p>
            <div class="banner-actions">
              <button class="play-btn" (click)="playVideo(video)">
                <mat-icon>play_arrow</mat-icon> Play
              </button>
            </div>
          </div>
        </div>
      </div>
      <button class="slider-nav prev" (click)="prevSlide()" *ngIf="featuredVideos.length > 1">
        <mat-icon>chevron_left</mat-icon>
      </button>

      <button class="slider-nav next" (click)="nextSlide()" *ngIf="featuredVideos.length > 1">
        <mat-icon>chevron_right</mat-icon>
      </button>

      <div class="slider-indicators" *ngIf="featuredVideos.length > 1">
        <button
          *ngFor="let video of featuredVideos; let i = index"
          class="indicator"
          [class.active]="i === currentSlideIndex"
          (click)="goToSlide(i)"
          [attr.aria-label]="'Go to slide ' + (i + 1)"
        ></button>
      </div>
    </div>
  </section>
</div>
